<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Reaction - Multi Arena</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Leaderboard table untuk multi-player */
        #multi-scoreboard {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 10px;
        }
        #multi-scoreboard th {
            color: #e10600;
            font-size: 10px;
            letter-spacing: 1px;
            padding: 6px 4px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        #multi-scoreboard td {
            padding: 7px 4px;
            border-bottom: 1px solid #1a1a1a;
            transition: background 0.2s;
        }
        #multi-scoreboard tr:hover td { background: rgba(225,6,0,0.04); }
        .pos-medal { font-size: 14px; }
        .score-bar-wrap {
            background: #111;
            border-radius: 2px;
            height: 5px;
            width: 60px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-left: 6px;
        }
        .score-bar-fill {
            height: 100%;
            background: var(--f1-red);
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        /* Result popup multi */
        #result-popup-multi {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 99;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .podium-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 6px;
            margin: 4px 0;
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.04);
            transition: background 0.2s;
        }
        .podium-entry.me { background: rgba(0,255,102,0.08); border: 1px solid rgba(0,255,102,0.2); }
        .podium-pos { font-size: 22px; min-width: 30px; }
        .podium-name { flex: 1; font-weight: bold; font-size: 14px; }
        .podium-wins { color: #e10600; font-weight: bold; font-size: 16px; min-width: 30px; text-align: right; }
        .podium-avg  { color: #aaa; font-size: 12px; min-width: 60px; text-align: right; }
    </style>
</head>
<body>
    <!-- ─── ROUND RESULT POPUP (auto-close) ─────────────────────── -->
    <div id="result-popup" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.93); z-index:98; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
        <h1 id="res-title" style="font-size:46px; margin-bottom:8px; letter-spacing:2px;">WIN</h1>
        <p id="res-detail" style="color:#aaa; margin-bottom:16px; font-size:15px; text-align:center;"></p>
        <div id="res-scores-list" style="width:100%; max-width:380px; margin-bottom:16px;"></div>
        <button id="btn-popup-close" onclick="closeRoundPopup()" style="background:#333; color:#aaa; padding:10px 30px; border:1px solid #444; border-radius:4px; font-size:13px; width:160px;">TUTUP</button>
    </div>

    <!-- ─── MATCH END POPUP (manual close) ─────────────────────── -->
    <div id="result-popup-multi" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:99; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
        <h1 id="multi-res-title" style="font-size:42px; margin-bottom:6px; letter-spacing:2px; text-align:center;">PODIUM AKHIR</h1>
        <p id="multi-res-sub" style="color:#aaa; margin-bottom:20px; font-size:14px; text-align:center;"></p>

        <div id="podium-list" style="width:100%; max-width:420px; margin-bottom:24px;"></div>

        <div style="background:rgba(255,255,255,0.05); padding:16px 20px; border-radius:8px; margin-bottom:22px; width:100%; max-width:400px; border-top:3px solid var(--f1-red);">
            <h3 style="margin-top:0; color:var(--f1-red); font-size:13px; letter-spacing:1px;">STATISTIKMU</h3>
            <p style="margin:4px 0; font-size:13px;">Menang: <span id="mf-wins" style="color:white; font-weight:bold;">-</span></p>
            <p style="margin:4px 0; font-size:13px;">Avg Reaction: <span id="mf-avg" style="color:white; font-weight:bold;">-</span></p>
            <p style="margin:4px 0; font-size:13px;">Consistency: <span id="mf-cons" style="color:white; font-weight:bold;">-</span></p>
            <p style="margin:4px 0; font-size:13px;">Posisi Akhir: <span id="mf-rank" style="color:white; font-weight:bold;">-</span></p>
        </div>

        <div style="display:flex; gap:10px;">
            <button onclick="location.href='index.html'" style="background:#333; color:#aaa; padding:12px 20px; border:1px solid #444; border-radius:4px; font-size:13px; width:160px;">🏠 HOME</button>
            <button onclick="location.reload()" style="background:#e10600; color:white; padding:12px 20px; border:none; border-radius:4px; font-size:13px; font-weight:bold; width:160px;">MAIN LAGI</button>
        </div>
    </div>

    <div class="game-container">
        <!-- LEFT: Lights + controls -->
        <div class="game-left">
            <div class="f1-lights">
                <div class="light-unit" id="l1"><div class="bulb"></div><div class="bulb"></div></div>
                <div class="light-unit" id="l2"><div class="bulb"></div><div class="bulb"></div></div>
                <div class="light-unit" id="l3"><div class="bulb"></div><div class="bulb"></div></div>
                <div class="light-unit" id="l4"><div class="bulb"></div><div class="bulb"></div></div>
                <div class="light-unit" id="l5"><div class="bulb"></div><div class="bulb"></div></div>
            </div>
            <h2 id="game-status" style="font-size:28px; font-weight:900; letter-spacing:3px; margin:20px 0; transition:color 0.3s;">SIAP...</h2>
            <div id="round-label" style="font-size:16px; margin-bottom:6px; font-weight:bold; color:#aaa;">
                RONDE: <span id="current-round-text" style="color:white;">1</span>/5
            </div>
            <div id="player-count-game" style="font-size:13px; color:#555; margin-bottom:10px;">
                Pemain: <span id="active-player-count" style="color:#aaa;">-</span>
            </div>
            <button id="btn-game-ready" onclick="sendReadyMulti()" class="btn-ready" style="width:260px;">
                READY (<span id="rd-count">0</span>/<span id="rd-total">?</span>)
            </button>
        </div>

        <!-- RIGHT: Scoreboard -->
        <div class="game-right">
            <h3 style="font-size:12px; letter-spacing:2px; color:#e10600; margin-bottom:8px;">🏆 SCOREBOARD</h3>
            <div id="multi-live-board" style="margin-bottom:16px;">
                <table id="multi-scoreboard">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>PEMAIN</th>
                            <th style="text-align:right;">WIN</th>
                            <th style="text-align:right;">LAST</th>
                        </tr>
                    </thead>
                    <tbody id="scoreboard-body"></tbody>
                </table>
            </div>

            <div style="margin-top:12px; padding:10px; background:rgba(255,255,255,0.04); border-radius:5px;">
                <h5 style="font-size:10px; color:#555; letter-spacing:1px; margin-bottom:8px;">MY STATS</h5>
                <div class="stat-grid" style="grid-template-columns:1fr 1fr;">
                    <div class="stat-card"><h5>Last Reaction</h5><span id="st-re">-</span></div>
                    <div class="stat-card"><h5>Winrate</h5><span id="st-wr">-</span></div>
                    <div class="stat-card"><h5>Avg Score</h5><span id="st-av">-</span></div>
                    <div class="stat-card"><h5>Consistency</h5><span id="st-cs">-</span></div>
                </div>
            </div>

            <button onclick="location.href='stats.html'" style="margin-top:16px; background:#e10600; color:white; width:100%; padding:12px; border:none; cursor:pointer; font-weight:bold; text-transform:uppercase; font-size:13px;">VIEW HISTORY</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game_multi.js"></script>
</body>
</html>
